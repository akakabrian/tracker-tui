name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install pyright

          has_dev_extra="$(python - <<'PY'
from pathlib import Path

try:
    import tomllib
except ModuleNotFoundError:  # pragma: no cover
    import tomli as tomllib

pyproject = Path("pyproject.toml")
if not pyproject.exists():
    print("0")
    raise SystemExit(0)

project = tomllib.loads(pyproject.read_text(encoding="utf-8")).get("project", {})
optional = project.get("optional-dependencies", {})
print("1" if "dev" in optional else "0")
PY
)"

          if python -m pip install -e .; then
            echo "Installed with pip install -e ."
          elif [ "${has_dev_extra}" = "1" ]; then
            python -m pip install -e ".[dev]"
          else
            exit 1
          fi

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -f Makefile ] && grep -Eq '^[[:space:]]*test:' Makefile; then
            make test
          else
            python -m tests.qa
          fi

      - name: Infer package directory
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          pkg_dir="$(python - <<'PY'
from pathlib import Path
import re

try:
    import tomllib
except ModuleNotFoundError:  # pragma: no cover
    import tomli as tomllib

root = Path(".")
ignore = {
    ".git",
    ".github",
    ".venv",
    "tests",
    "vendor",
    "build",
    "dist",
    "__pycache__",
}

candidates = []
for child in root.iterdir():
    if not child.is_dir():
        continue
    if child.name.startswith(".") or child.name in ignore:
        continue
    if (child / "__init__.py").exists():
        candidates.append(child.name)

if not candidates:
    pyproject = root / "pyproject.toml"
    if pyproject.exists():
        data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
        project_name = data.get("project", {}).get("name", "")
        if project_name:
            normalized = re.sub(r"[-.]+", "_", project_name)
            if (root / normalized / "__init__.py").exists():
                candidates.append(normalized)

if len(candidates) != 1:
    found = ", ".join(sorted(candidates)) or "none"
    raise SystemExit(f"Could not infer unique package directory (found: {found})")

print(candidates[0])
PY
)"
          echo "pkg_dir=${pkg_dir}" >> "$GITHUB_OUTPUT"

      - name: Run pyright
        run: pyright "${{ steps.pkg.outputs.pkg_dir }}/" tests/
