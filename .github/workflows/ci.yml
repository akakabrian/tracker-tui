name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
            setup.cfg
            requirements*.txt

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            python -m pip install -e .
          fi
          python -m pip install pytest

      - name: Pyright
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install pyright
          if python -c "import tomllib; import pathlib; p=pathlib.Path('pyproject.toml'); d=tomllib.loads(p.read_text()) if p.exists() else {}; exit(0 if 'dev' in d.get('project',{}).get('optional-dependencies',{}) else 1)"; then
            python -m pip install -e '.[dev]'
          fi
          pyright || true

      - name: QA tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -f tests/qa.py ]; then
            python -m pytest tests/qa.py -x || true
          fi
